# ============================================================
# Ombre Brain Configuration / 配置文件
# ============================================================

transport: "stdio"

log_level: "INFO"

# buckets_dir: "/path/to/your/Obsidian Vault/Ombre Brain"

merge_threshold: 75

dehydration:
  model: "gemini-2.0-flash"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
  max_tokens: 4096
  temperature: 0.1

decay:
  lambda: 0.05
  threshold: 0.3
  check_interval_hours: 24
  emotion_weights:
    base: 1.0
    arousal_boost: 0.8

embedding:
  enabled: true
  backend: "api"
  model: "gemini-embedding-001"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"

scoring_weights:
  topic_relevance: 4.0
  emotion_resonance: 2.0
  time_proximity: 1.5
  importance: 1.0

matching:
  fuzzy_threshold: 50
  max_results: 5

surfacing:
  breath_max_results: 20
  breath_max_tokens: 10000
  feel_max_tokens: 6000
  sampling:
    enabled: false
    top_k: 5
    sample_k: 2
    temperature: 0.7

limits:
  max_bucket_bytes: 51200
  max_pinned: 20

bucket_type_defaults:
  letter:
    weight: 1.0
    dont_surface: false
  plan:
    weight: 0.5

wikilink:
  enabled: true
  use_tags: false
  use_domain: true
  use_auto_keywords: true
  auto_top_k: 4
  min_keyword_len: 3
  exclude_keywords: []
